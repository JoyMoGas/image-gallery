<div class="gallery-container">
  <header class="header">
    <div class="header-content">
      <h1>Galería Interactiva</h1>
      <div class="likes-counter">
        <i class="fa-solid fa-heart heart-icon" style="color: var(--danger-color);"></i>
        <span class="likes-number">{{ totalLikes }}</span>
        <span class="likes-label">Likes Totales</span>
      </div>
    </div>
  </header>

  <section class="add-photo-section">
    <div class="form-card">
      <h2>Agregar Nueva Foto</h2>
      <div class="form-group">
        <input 
          type="text" 
          placeholder="URL de la imagen (ej. https://...)" 
          [(ngModel)]="newPhotoUrl"
        >
        <input 
          type="text" 
          placeholder="Título de la foto" 
          [(ngModel)]="newPhotoTitle"
          (keyup.enter)="addPhoto()"
        >
        <button 
          class="btn-primary" 
          (click)="addPhoto()" 
          [disabled]="!newPhotoUrl || !newPhotoTitle"
        >
          Agregar a la Galería
        </button>
      </div>
    </div>
  </section>

  <section class="grid-section">
    <div *ngIf="photos.length === 0" class="empty-state">
      <p>La galería está vacía. ¡Agrega tu primera foto!</p>
    </div>

    <div class="photo-grid" *ngIf="photos.length > 0">
      <div class="photo-card" *ngFor="let photo of photos">
        <div class="photo-wrapper">
          <img [src]="photo.url" [alt]="photo.title" class="photo-img" (error)="photo.url = 'https://via.placeholder.com/400x300?text=Imagen+No+Disponible'">
          <div class="photo-overlay">
            <button class="btn-delete" (click)="deletePhoto(photo.id)" title="Eliminar foto">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
        <div class="photo-info">
          <h3 class="photo-title">{{ photo.title }}</h3>
          <div class="photo-actions">
            <button class="btn-like" (click)="likePhoto(photo.id)">
              <i class="fa-solid fa-heart heart"></i> {{ photo.likes }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
